<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <title>Keystone</title>

  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#faf3e8" />

  <!-- iOS install support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Keystone" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />

  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <!-- HOME -->
  <section class="screen" data-screen="home">
    <button class="gear-btn" id="open-settings" aria-label="Settings">⚙</button>
    <div class="screen-content home-content">
      <div class="monkey-slot" aria-hidden="true">
        <!-- placeholder: real monkey art comes later from Claude Design -->
        <span class="monkey-placeholder">🐵</span>
      </div>
      <h1 class="app-title">Keystone</h1>
      <div class="home-buttons">
        <button class="home-btn" id="nav-study">Study</button>
        <button class="home-btn" id="nav-work">Work day</button>
        <button class="home-btn" id="nav-rest">Rest day</button>
      </div>
    </div>
  </section>

  <!-- STUDY -->
  <section class="screen theme-neutral hidden" data-screen="study">
    <button class="back-btn" data-back>‹ Home</button>
    <div class="screen-content study-content">
      <div class="weekly-display">
        <div class="weekly-hours" id="weekly-hours">0h 0m</div>
        <div class="weekly-target" id="weekly-target-label">of 12h this week</div>
        <button class="link-btn" id="open-total-popup">190h total</button>
      </div>

      <div class="pomodoro">
        <div class="pomodoro-durations" id="pomodoro-durations">
          <button class="duration-btn" data-minutes="25">25</button>
          <button class="duration-btn selected" data-minutes="30">30</button>
          <button class="duration-btn" data-minutes="60">60</button>
          <button class="duration-btn" data-minutes="custom">Custom</button>
        </div>
        <input type="number" id="custom-minutes" class="custom-minutes hidden" min="1" max="240" placeholder="minutes" />
        <button class="primary-btn" id="start-session">Start session</button>
      </div>
    </div>
  </section>

  <!-- CHECK-IN (Work day / Rest day) -->
  <section class="screen hidden" data-screen="checkin" id="checkin-screen">
    <button class="back-btn" data-back>‹ Home</button>
    <div class="screen-content checkin-content">
      <h2 id="checkin-title">Today</h2>
      <ul class="checkin-list" id="checkin-list">
        <!-- items injected by checkin.js -->
      </ul>
    </div>
  </section>

  <!-- SETTINGS -->
  <section class="screen hidden" data-screen="settings">
    <button class="back-btn" data-back>‹ Home</button>
    <div class="screen-content settings-content">
      <h2>Settings</h2>
      <div class="settings-row">
        <label for="weekly-target-input">Weekly target (hours)</label>
        <input type="number" id="weekly-target-input" min="1" max="100" />
      </div>
      <div class="settings-row">
        <label for="total-target-input">Total goal (hours)</label>
        <input type="number" id="total-target-input" min="1" max="2000" />
      </div>
      <div class="settings-row settings-buttons">
        <button class="secondary-btn" id="export-btn">Export data</button>
        <label class="secondary-btn file-label">
          Import data
          <input type="file" id="import-input" accept="application/json" class="hidden" />
        </label>
      </div>
    </div>
  </section>

  <!-- Total progress popup -->
  <div class="overlay hidden" id="total-popup">
    <div class="popup">
      <h2>Total progress</h2>
      <div class="total-progress-text" id="total-progress-text">0h of 190h</div>
      <div class="progress-bar"><div class="progress-bar-fill" id="total-progress-fill"></div></div>
      <button class="primary-btn" id="close-total-popup">Close</button>
    </div>
  </div>

  <!-- Full-screen pomodoro focus -->
  <div class="overlay fullscreen theme-neutral hidden" id="focus-screen">
    <div class="focus-content">
      <div class="focus-time" id="focus-time">25:00</div>
      <div class="focus-label" id="focus-label">Focus</div>
      <textarea class="notes" id="focus-notes" placeholder="Notes for this session..."></textarea>
      <div class="focus-buttons">
        <button class="secondary-btn" id="focus-pause">Pause</button>
        <button class="danger-btn" id="focus-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Full-screen "doing it now" -->
  <div class="overlay fullscreen hidden" id="doing-screen">
    <div class="focus-content">
      <div class="doing-label" id="doing-label">Item</div>
      <button class="primary-btn" id="doing-finished">Finished</button>
      <button class="secondary-btn" id="doing-back">Back</button>
    </div>
  </div>

  <script src="./storage.js"></script>
  <script src="./study.js"></script>
  <script src="./checkin.js"></script>
  <script src="./settings.js"></script>
  <script src="./nav.js"></script>
  <script src="./app.js"></script>
</body>
</html>
